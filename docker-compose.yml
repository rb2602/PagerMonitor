# ─────────────────────────────────────────────────────────────────────────────
# PagerMonitor — Docker Compose
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  QUICK START                                                            │
# │                                                                         │
# │  Option A — Single device (RPi with SDR dongle):                       │
# │    cp .env.example .env && nano .env                                    │
# │    docker compose up -d                                                 │
# │                                                                         │
# │  Option B — Separate server (no SDR, clients forward via HTTP):         │
# │    cp .env.example .env                                                 │
# │    Set DISABLE_SDR=true in .env                                         │
# │    docker compose --profile server up -d                                │
# │                                                                         │
# │  View logs:    docker compose logs -f                                   │
# │  Stop:         docker compose down                                      │
# │  Update:       docker compose pull && docker compose up -d --build      │
# └─────────────────────────────────────────────────────────────────────────┘
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Option A: Single device (SDR + server on same machine) ───────────────
  # Default profile — runs when you do: docker compose up -d
  pagermonitor:
    build:
      context: .
      dockerfile: docker/Dockerfile.single
      args:
        NODE_VERSION: "20"
    image: pagermonitor:latest
    container_name: pagermonitor
    restart: unless-stopped
    profiles: ["single", ""]    # default profile (no --profile flag needed)
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - pagermonitor-data:/app/backend/data
    env_file:
      - .env
    environment:
      - MODE=single
      - DISABLE_SDR=${DISABLE_SDR:-false}
    devices:
      # RTL-SDR dongle — comment out if not connected
      - /dev/bus/usb:/dev/bus/usb
    # ── USB / RTL-SDR troubleshooting ────────────────────────────────────────
    # If rtl_fm fails to open the device, check the error code:
    #
    # usb_open error -3  (LIBUSB_ERROR_ACCESS — permission denied)
    #   1. Create udev rules on the HOST:
    #        echo 'SUBSYSTEM=="usb", ATTRS{idVendor}=="0bda", ATTRS{idProduct}=="2838", MODE="0666", GROUP="plugdev"' \
    #             | sudo tee /usr/lib/udev/rules.d/20-rtlsdr.rules
    #        sudo udevadm control --reload-rules && sudo udevadm trigger
    #   2. Find the plugdev GID:  getent group plugdev   (commonly 46 on Raspberry Pi)
    #   3. Add to this service:
    #        privileged: true
    #        user: "node:<plugdev-gid>"   # e.g. user: "node:46"
    #
    # usb_open error -4  (LIBUSB_ERROR_NO_DEVICE — device not accessible)
    #   The host kernel's DVB driver has claimed the dongle before rtl_fm can open it.
    #   Blacklist it on the HOST, then replug the dongle and restart the container:
    #        echo 'blacklist dvb_usb_rtl28xxu' | sudo tee /etc/modprobe.d/blacklist-rtlsdr.conf
    #        sudo rmmod dvb_usb_rtl28xxu   # unload without rebooting
    #        sudo update-initramfs -u      # persist across reboots (Debian/Ubuntu/RPiOS)
    # ─────────────────────────────────────────────────────────────────────────
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Option B: Server only (no SDR, receives from remote RPi clients) ─────
  # Run with: docker compose --profile server up -d
  pagermonitor-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    image: pagermonitor-server:latest
    container_name: pagermonitor-server
    restart: unless-stopped
    profiles: ["server"]
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - pagermonitor-data:/app/backend/data
    env_file:
      - .env
    environment:
      - MODE=server
      - DISABLE_SDR=true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pagermonitor-data:
    name: pagermonitor-data
    labels:
      com.pagermonitor.description: "PagerMonitor database storage"
