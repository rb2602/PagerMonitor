name: CI

# Runs on every push and pull request to main/dev branches
# Catches syntax errors and failed builds before they reach production

on:
  push:
    branches: [main, master, dev]
    paths-ignore:
      - '**.md'
      - 'CHANGELOG.md'
      - '.env.example'
      - 'client/.env.example'
  pull_request:
    branches: [main, master]

jobs:
  check:
    name: Syntax check & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Check backend syntax
        run: |
          cd backend && npm install
          echo "Checking backend files..."
          find src -name "*.js" | xargs -I{} node --check {} && echo "✅ Backend syntax OK"

      - name: Build frontend
        run: |
          cd frontend && npm install && npm run build
          echo "✅ Frontend build OK"

      - name: Verify version consistency
        run: |
          PKG=$(node -p "require('./backend/package.json').version")
          echo "✅ Version: $PKG"
